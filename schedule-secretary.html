<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박정리 · 일정 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Fraunces:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--white:#fff;--s1:#f8f9fc;--border:#e4e8f0;--border2:#d0d6e4;
  --text:#1a1f2e;--muted:#8896b0;--muted2:#5a6880;
  --green:#10b981;--green-d:#059669;--green-l:#ecfdf5;--green-ll:#f0fdf8;
  --blue:#3b82f6;--blue-l:#eff6ff;--red:#ef4444;--red-l:#fef2f2;
  --amber:#f59e0b;--amber-l:#fffbeb;--purple:#8b5cf6;--purple-l:#f5f3ff;
  --mono:'IBM Plex Mono',monospace;--serif:'Fraunces',serif;--sans:'Noto Sans KR',sans-serif;
  --r:16px;--r-sm:10px;--shadow:0 2px 16px rgba(0,0,0,0.07);--shadow-lg:0 8px 40px rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:var(--sans);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.staff-badge{display:flex;align-items:center;gap:10px}
.badge-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#064e3b,#065f46);display:flex;align-items:center;justify-content:center;font-size:17px;position:relative}
.badge-online{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid var(--white);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 4px rgba(34,197,94,0)}}
.badge-name{font-size:14px;font-weight:700}
.badge-role{font-size:10px;color:var(--muted);font-family:var(--mono)}
.badge-dept{background:var(--green-l);color:var(--green-d);font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 9px;border-radius:99px;font-family:var(--mono)}
.topbar-right{display:flex;gap:7px;align-items:center}
.tb-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--white);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--muted2);text-decoration:none}
.tb-btn:hover{border-color:var(--green);color:var(--green-d);background:var(--green-l)}
.tb-btn.active{border-color:var(--green);color:var(--green-d);background:var(--green-l)}
.gcal-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.gcal-dot.connected{background:#4285f4;animation:pb 2s infinite}
@keyframes pb{0%,100%{box-shadow:0 0 0 0 rgba(66,133,244,.4)}50%{box-shadow:0 0 0 4px rgba(66,133,244,0)}}
.main{max-width:720px;margin:0 auto;padding:24px 20px 60px;display:flex;flex-direction:column;gap:0}
/* 빠른 추가 */
.quick-add{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
.qa-tabs{display:flex;background:var(--s1);border-radius:var(--r-sm);padding:3px;margin-bottom:12px;border:1px solid var(--border)}
.qa-tab{flex:1;padding:7px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted2)}
.qa-tab.active{background:var(--white);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.08)}
.qa-form{display:none;flex-direction:column;gap:8px}
.qa-form.active{display:flex}
.f-row{display:flex;gap:8px}
.f-input,.f-select{flex:1;padding:9px 12px;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s;min-width:0}
.f-input:focus,.f-select:focus{border-color:var(--green);background:var(--white)}
.f-save{padding:9px 18px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.f-save:hover{background:var(--green-d)}
.repeat-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.repeat-label{font-size:11px;color:var(--muted2);white-space:nowrap}
.repeat-chips{display:flex;gap:4px;flex-wrap:wrap}
.rc{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--s1);color:var(--muted2);cursor:pointer;transition:all .15s;font-family:inherit}
.rc.on{border-color:var(--purple);background:var(--purple-l);color:var(--purple)}
/* 리스트 */
.section{margin-bottom:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;margin-bottom:6px}
.section-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.section-count{font-size:10px;color:var(--muted);font-family:var(--mono)}
.week-div{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.week-div-line{flex:1;height:1px;background:var(--border)}
.week-div-label{font-size:11px;font-weight:700;color:var(--muted2);font-family:var(--mono);letter-spacing:1px}
.items-list{display:flex;flex-direction:column;gap:5px}
.item{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;transition:all .2s}
.item:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.item.done{opacity:.5}
.item.done .item-title{text-decoration:line-through;color:var(--muted)}
.item-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);background:var(--s1);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.item-check:hover{border-color:var(--green)}
.item-check.checked{background:var(--green);border-color:var(--green)}
.item-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.item-body{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.4}
.item-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px}
.item-time{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green-d);background:var(--green-l);padding:2px 8px;border-radius:99px}
.item-place{font-size:11px;color:var(--muted2)}
.item-del{color:var(--muted);font-size:12px;cursor:pointer;padding:3px 5px;border:none;background:none;border-radius:4px;transition:color .15s;flex-shrink:0}
.item-del:hover{color:var(--red)}
.chip{display:inline-flex;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;font-family:var(--mono)}
.chip-green{background:var(--green-l);color:var(--green-d)}
.chip-red{background:var(--red-l);color:var(--red)}
.chip-purple{background:var(--purple-l);color:var(--purple)}
.chip-gcal{background:#fef2f2;color:#dc2626}
.empty-state{text-align:center;padding:18px 0;color:var(--muted);font-size:13px;background:var(--white);border:1.5px dashed var(--border);border-radius:12px}
/* 캘린더 */
.cal-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px;margin-top:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-family:var(--serif);font-size:17px}
.cal-nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--s1);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--green-l);border-color:var(--green)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;font-family:var(--mono)}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px;border-radius:8px;cursor:pointer;transition:all .15s;min-height:36px}
.cal-cell:hover{background:var(--s1)}
.cal-cell.today{background:var(--green);color:#fff;font-weight:700}
.cal-cell.selected{background:var(--green-l);border:1.5px solid var(--green)}
.cal-cell.other-month{opacity:.3}
.cal-num{font-size:12px;font-weight:600;line-height:1}
.cal-cell.today .cal-num{color:#fff!important}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.dot-app{background:var(--green)}.dot-todo{background:var(--blue)}.dot-gcal{background:#ea4335}
.sel-day{background:var(--green-ll);border-radius:var(--r-sm);padding:12px 14px;margin-top:12px;border:1px solid var(--green-l)}
.sel-day-title{font-size:12px;font-weight:700;color:var(--green-d);margin-bottom:8px}
/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--white);border-radius:var(--r);padding:26px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-title{font-family:var(--serif);font-size:19px;margin-bottom:10px}
.m-input{width:100%;padding:10px 13px;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:var(--mono);color:var(--text);outline:none;margin-bottom:8px;transition:border-color .2s}
.m-input:focus{border-color:var(--green)}
.gcal-note{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.gcal-btn{padding:8px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .2s;font-family:inherit}
.gcal-btn.connect{border-color:#4285f4;background:#fff;color:#4285f4}
.gcal-btn.connect:hover{background:#eff6ff}
.gcal-btn.disconnect{border-color:var(--red);background:var(--red-l);color:var(--red)}
.m-close{width:100%;margin-top:12px;padding:10px;background:var(--s1);color:var(--muted2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-family:inherit}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:var(--shadow-lg);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="staff-badge">
    <div class="badge-avatar">📅<div class="badge-online"></div></div>
    <div>
      <div class="badge-name">박정리</div>
      <div class="badge-role">SCHEDULE SECRETARY · <span id="yearsLabel"></span></div>
    </div>
    <div class="badge-dept">총무팀</div>
  </div>
  <div class="topbar-right">
    <a class="tb-btn" href="my-ai-staff-v2.html">← 허브로</a>
    <button class="tb-btn" id="gcalBtn" onclick="openSettings()">
      <span class="gcal-dot" id="gcalDot"></span>
      <span id="gcalLabel">Google Calendar</span>
    </button>
  </div>
</div>

<div class="main">

  <!-- 빠른 추가 -->
  <div class="quick-add">
    <div class="qa-tabs">
      <div class="qa-tab active" id="tab-event" onclick="switchTab('event')">📅 일정</div>
      <div class="qa-tab" id="tab-todo" onclick="switchTab('todo')">✅ 할일</div>
    </div>
    <!-- 일정 -->
    <div class="qa-form active" id="form-event">
      <div class="f-row">
        <input class="f-input" id="e-title" placeholder="일정 제목" style="flex:2">
        <input class="f-input" id="e-date" type="date" style="flex:1">
      </div>
      <div class="f-row">
        <input class="f-input" id="e-time" type="time">
        <input class="f-input" id="e-place" placeholder="장소 (선택)">
      </div>
      <div class="repeat-row">
        <span class="repeat-label">🔁 반복:</span>
        <div class="repeat-chips">
          <button class="rc on" id="rce-none" onclick="setRep('event','none')">없음</button>
          <button class="rc" id="rce-daily" onclick="setRep('event','daily')">매일</button>
          <button class="rc" id="rce-weekly" onclick="setRep('event','weekly')">매주</button>
          <button class="rc" id="rce-monthly" onclick="setRep('event','monthly')">매달</button>
        </div>
      </div>
      <div id="e-wd-row" style="display:none;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="repeat-label">요일:</span>
        <div style="display:flex;gap:4px">
          <button class="rc" onclick="this.classList.toggle('on')">일</button>
          <button class="rc" onclick="this.classList.toggle('on')">월</button>
          <button class="rc" onclick="this.classList.toggle('on')">화</button>
          <button class="rc" onclick="this.classList.toggle('on')">수</button>
          <button class="rc" onclick="this.classList.toggle('on')">목</button>
          <button class="rc" onclick="this.classList.toggle('on')">금</button>
          <button class="rc" onclick="this.classList.toggle('on')">토</button>
        </div>
      </div>
      <button class="f-save" onclick="addEvent()">+ 추가</button>
    </div>
    <!-- 할일 -->
    <div class="qa-form" id="form-todo">
      <div class="f-row">
        <input class="f-input" id="t-title" placeholder="할일 내용" style="flex:2">
        <input class="f-input" id="t-date" type="date" style="flex:1">
      </div>
      <div class="f-row">
        <input class="f-input" id="t-time" type="time">
        <select class="f-select" id="t-priority">
          <option value="normal">보통</option>
          <option value="high">🔴 중요</option>
          <option value="low">⚪ 낮음</option>
        </select>
      </div>
      <div class="repeat-row">
        <span class="repeat-label">🔁 반복:</span>
        <div class="repeat-chips">
          <button class="rc on" id="rct-none" onclick="setRep('todo','none')">없음</button>
          <button class="rc" id="rct-daily" onclick="setRep('todo','daily')">매일</button>
          <button class="rc" id="rct-weekly" onclick="setRep('todo','weekly')">매주</button>
          <button class="rc" id="rct-monthly" onclick="setRep('todo','monthly')">매달</button>
        </div>
      </div>
      <div id="t-wd-row" style="display:none;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="repeat-label">요일:</span>
        <div style="display:flex;gap:4px">
          <button class="rc" onclick="this.classList.toggle('on')">일</button>
          <button class="rc" onclick="this.classList.toggle('on')">월</button>
          <button class="rc" onclick="this.classList.toggle('on')">화</button>
          <button class="rc" onclick="this.classList.toggle('on')">수</button>
          <button class="rc" onclick="this.classList.toggle('on')">목</button>
          <button class="rc" onclick="this.classList.toggle('on')">금</button>
          <button class="rc" onclick="this.classList.toggle('on')">토</button>
        </div>
      </div>
      <button class="f-save" onclick="addTodo()">+ 추가</button>
    </div>
  </div>

  <!-- 리스트 -->
  <div id="listContainer"></div>

  <!-- 캘린더 (맨 아래) -->
  <div class="cal-card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="sel-day" id="selDay" style="display:none">
      <div class="sel-day-title" id="selDayTitle"></div>
      <div id="selDayItems"></div>
    </div>
  </div>

</div>

<!-- Google Calendar 모달 -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-title">🗓 Google Calendar</div>
    <div id="gcalInputWrap">
      <input class="m-input" id="gcalClientId" placeholder="xxxxx.apps.googleusercontent.com">
      <div class="gcal-note">💡 <a href="https://console.cloud.google.com" target="_blank" style="color:var(--blue)">Google Cloud Console</a>에서 OAuth 2.0 클라이언트 ID를 입력하세요.</div>
      <button class="gcal-btn connect" onclick="connectGcal()">연동하기</button>
    </div>
    <div id="gcalConnectedWrap" style="display:none">
      <div style="font-size:13px;color:var(--green-d);margin-bottom:10px">✅ 연동됨 · <span id="gcalEventCount">0</span>개 일정</div>
      <button class="gcal-btn disconnect" onclick="disconnectGcal()">연동 해제</button>
    </div>
    <button class="m-close" onclick="closeSettings()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state=JSON.parse(localStorage.getItem('schedule_v1')||'{}');
if(!state.events) state.events=[];
if(!state.todos)  state.todos=[];
if(!state.settings) state.settings={name:'박정리',hireDate:'2024-01-15'};

let gcalClientId=localStorage.getItem('gcalClientId')||'';
let gcalConnected=localStorage.getItem('gcalConnected')==='true';
let gcalEvents=[];
let currentMonth=new Date();
let selectedDate=new Date().toISOString().slice(0,10);
let repEvent='none', repTodo='none';

function save(){localStorage.setItem('schedule_v1',JSON.stringify(state))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function getYears(d){const m=Math.floor((new Date()-new Date(d))/(1000*60*60*24*30.5));return m<12?`${m}개월차`:`${Math.floor(m/12)}년 ${m%12}개월차`}
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function fmtDate(d){const dt=new Date(d+'T00:00:00');const days=['일','월','화','수','목','금','토'];return `${dt.getMonth()+1}/${dt.getDate()}(${days[dt.getDay()]})`}

function switchTab(tab){
  ['event','todo'].forEach(t=>{
    document.getElementById('form-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
}

function setRep(type,val){
  if(type==='event'){repEvent=val;['none','daily','weekly','monthly'].forEach(v=>document.getElementById('rce-'+v).classList.toggle('on',v===val));document.getElementById('e-wd-row').style.display=val==='weekly'?'flex':'none';}
  else{repTodo=val;['none','daily','weekly','monthly'].forEach(v=>document.getElementById('rct-'+v).classList.toggle('on',v===val));document.getElementById('t-wd-row').style.display=val==='weekly'?'flex':'none';}
}

function getWD(rowId){
  const btns=document.getElementById(rowId).querySelectorAll('.rc.on');
  return Array.from(btns).map(b=>['일','월','화','수','목','금','토'].indexOf(b.textContent)).filter(n=>n>=0);
}

function expandDates(item){
  const today=todayStr(), end=addDays(today,7), dates=[];
  if(!item.repeat||item.repeat==='none'){if(item.date>=today&&item.date<=end)dates.push(item.date);}
  else if(item.repeat==='daily'){for(let d=today;d<=end;d=addDays(d,1))dates.push(d);}
  else if(item.repeat==='weekly'){for(let d=today;d<=end;d=addDays(d,1)){const wd=new Date(d+'T00:00:00').getDay();if(!item.weekdays||item.weekdays.length===0||item.weekdays.includes(wd))dates.push(d);}}
  else if(item.repeat==='monthly'){const dom=new Date(item.date+'T00:00:00').getDate();for(let d=today;d<=end;d=addDays(d,1))if(new Date(d+'T00:00:00').getDate()===dom)dates.push(d);}
  return dates;
}

function addEvent(){
  const title=document.getElementById('e-title').value.trim();
  if(!title){toast('제목을 입력해주세요!');return;}
  state.events.push({id:Date.now().toString(),title,date:document.getElementById('e-date').value||todayStr(),time:document.getElementById('e-time').value,place:document.getElementById('e-place').value.trim(),repeat:repEvent,weekdays:repEvent==='weekly'?getWD('e-wd-row'):[],source:'app',createdAt:new Date().toISOString()});
  save();renderList();renderCalendar();
  ['e-title','e-place','e-time'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('e-date').value=todayStr();
  toast('✅ 일정 추가됐어요!');
}

function addTodo(){
  const title=document.getElementById('t-title').value.trim();
  if(!title){toast('할일을 입력해주세요!');return;}
  state.todos.push({id:Date.now().toString(),title,date:document.getElementById('t-date').value||todayStr(),time:document.getElementById('t-time').value,priority:document.getElementById('t-priority').value,repeat:repTodo,weekdays:repTodo==='weekly'?getWD('t-wd-row'):[],done:false,doneDates:[],source:'app',createdAt:new Date().toISOString()});
  save();renderList();renderCalendar();
  ['t-title','t-time'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-date').value=todayStr();
  toast('✅ 할일 추가됐어요!');
}

function isDone(todo,date){
  if(todo.repeat&&todo.repeat!=='none')return(todo.doneDates||[]).includes(date);
  return todo.done;
}
function toggleDone(id,date){
  const td=state.todos.find(t=>t.id===id);if(!td)return;
  if(td.repeat&&td.repeat!=='none'){if(!td.doneDates)td.doneDates=[];const i=td.doneDates.indexOf(date);if(i>=0)td.doneDates.splice(i,1);else td.doneDates.push(date);}
  else td.done=!td.done;
  save();renderList();
}
function delEvent(id){state.events=state.events.filter(e=>e.id!==id);save();renderList();renderCalendar();toast('삭제됐어요.')}
function delTodo(id){state.todos=state.todos.filter(t=>t.id!==id);save();renderList();renderCalendar();toast('삭제됐어요.')}

function renderList(){
  const today=todayStr();
  const dm={};
  for(let i=0;i<=7;i++){dm[addDays(today,i)]={events:[],todos:[]};}
  state.events.forEach(ev=>expandDates(ev).forEach(d=>{if(dm[d])dm[d].events.push({...ev,_d:d});}));
  gcalEvents.forEach(ev=>{const d=(ev.start?.dateTime||ev.start?.date||'').slice(0,10);if(dm[d])dm[d].events.push({id:'g-'+ev.id,title:ev.summary||'',time:ev.start?.dateTime?new Date(ev.start.dateTime).toTimeString().slice(0,5):'',place:ev.location||'',source:'gcal',_d:d});});
  state.todos.forEach(td=>expandDates(td).forEach(d=>{if(dm[d])dm[d].todos.push({...td,_d:d});}));
  for(const d in dm){
    dm[d].events.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
    dm[d].todos.sort((a,b)=>{const da=isDone(a,d),db=isDone(b,d);if(da!==db)return da?1:-1;return(a.time||'99:99').localeCompare(b.time||'99:99');});
  }
  let html='';
  for(let i=0;i<=7;i++){
    const d=addDays(today,i);
    const {events,todos}=dm[d];
    const total=events.length+todos.length;
    const isToday=d===today, isTomorrow=d===addDays(today,1);
    const label=isToday?'오늘':isTomorrow?'내일':fmtDate(d);
    if(i>0&&new Date(d+'T00:00:00').getDay()===1)html+=`<div class="week-div"><div class="week-div-line"></div><div class="week-div-label">다음 주</div><div class="week-div-line"></div></div>`;
    html+=`<div class="section"><div class="section-header"><div class="section-title"><span>${isToday?'📍':isTomorrow?'🌅':'📆'}</span><span>${label}</span>${isToday?'<span class="chip chip-green">TODAY</span>':''}</div><span class="section-count">${total}건</span></div><div class="items-list">`;
    if(!total){html+=`<div class="empty-state">일정이 없어요 😊</div>`;}
    else{
      events.forEach(ev=>{html+=`<div class="item"><div class="item-body"><div class="item-title">${ev.title}</div><div class="item-meta">${ev.time?`<span class="item-time">${ev.time}</span>`:''}${ev.place?`<span class="item-place">📍${ev.place}</span>`:''}${ev.source==='gcal'?'<span class="chip chip-gcal">GCal</span>':''}${ev.repeat&&ev.repeat!=='none'?'<span class="chip chip-purple">🔁</span>':''}</div></div>${ev.source!=='gcal'?`<button class="item-del" onclick="delEvent('${ev.id}')">✕</button>`:''}</div>`;});
      todos.forEach(td=>{const done=isDone(td,d);html+=`<div class="item ${done?'done':''}"><div class="item-check ${done?'checked':''}" onclick="toggleDone('${td.id}','${d}')"></div><div class="item-body"><div class="item-title">${td.title}</div><div class="item-meta">${td.time?`<span class="item-time">${td.time}</span>`:''}${td.priority==='high'?'<span class="chip chip-red">중요</span>':''}${td.repeat&&td.repeat!=='none'?'<span class="chip chip-purple">🔁</span>':''}</div></div><button class="item-del" onclick="delTodo('${td.id}')">✕</button></div>`;});
    }
    html+=`</div></div>`;
  }
  document.getElementById('listContainer').innerHTML=html;
}

function renderCalendar(){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  document.getElementById('calTitle').textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1),last=new Date(y,m+1,0),startDow=first.getDay(),today=todayStr();
  let html='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{html+=`<div class="cal-dow" style="${i===0?'color:var(--red)':i===6?'color:var(--blue)':''}">${d}</div>`;});
  for(let i=0;i<startDow;i++){html+=`<div class="cal-cell other-month"><div class="cal-num">${new Date(y,m,1-startDow+i).getDate()}</div></div>`;}
  for(let day=1;day<=last.getDate();day++){
    const d=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow=new Date(d+'T00:00:00').getDay();
    const isToday=d===today,isSel=d===selectedDate&&!isToday;
    const hasEv=state.events.some(e=>expandDates(e).includes(d));
    const hasTd=state.todos.some(t=>expandDates(t).includes(d)&&!isDone(t,d));
    const hasGcal=gcalEvents.some(e=>(e.start?.dateTime||e.start?.date||'').slice(0,10)===d);
    html+=`<div class="cal-cell ${isToday?'today':''} ${isSel?'selected':''} " onclick="selectDate('${d}')" style="${!isToday&&dow===0?'color:var(--red)':!isToday&&dow===6?'color:var(--blue)':''}"><div class="cal-num">${day}</div><div class="cal-dots">${hasEv?'<div class="cal-dot dot-app"></div>':''}${hasTd?'<div class="cal-dot dot-todo"></div>':''}${hasGcal?'<div class="cal-dot dot-gcal"></div>':''}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderSelDay();
}

function selectDate(d){selectedDate=d;renderCalendar();}
function changeMonth(n){currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+n,1);renderCalendar();}

function renderSelDay(){
  const dt=new Date(selectedDate+'T00:00:00');
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('selDayTitle').textContent=`${dt.getMonth()+1}월 ${dt.getDate()}일 (${days[dt.getDay()]})`;
  const evs=state.events.filter(e=>expandDates(e).includes(selectedDate)).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const gcEvs=gcalEvents.filter(e=>(e.start?.dateTime||e.start?.date||'').slice(0,10)===selectedDate);
  const tds=state.todos.filter(t=>expandDates(t).includes(selectedDate));
  const el=document.getElementById('selDay');
  if(!evs.length&&!gcEvs.length&&!tds.length){el.style.display='none';return;}
  el.style.display='block';
  let html='<div style="display:flex;flex-direction:column;gap:6px">';
  evs.forEach(ev=>{html+=`<div style="font-size:12px;display:flex;align-items:center;gap:6px">${ev.time?`<span style="font-family:var(--mono);font-size:10px;color:var(--green-d);background:var(--green-l);padding:1px 7px;border-radius:99px">${ev.time}</span>`:''}<span style="font-weight:600">${ev.title}</span>${ev.place?`<span style="color:var(--muted);font-size:11px">📍${ev.place}</span>`:''}</div>`;});
  gcEvs.forEach(ev=>{const t=ev.start?.dateTime?new Date(ev.start.dateTime).toTimeString().slice(0,5):'종일';html+=`<div style="font-size:12px;display:flex;align-items:center;gap:6px"><span style="font-family:var(--mono);font-size:10px;color:#dc2626;background:#fef2f2;padding:1px 7px;border-radius:99px">${t}</span><span style="font-weight:600">${ev.summary||''}</span><span style="color:var(--muted);font-size:10px">GCal</span></div>`;});
  tds.forEach(td=>{const done=isDone(td,selectedDate);html+=`<div style="font-size:12px;display:flex;align-items:center;gap:6px"><span>${done?'☑':'☐'}</span><span style="${done?'text-decoration:line-through;color:var(--muted)':''}">${td.title}</span>${td.priority==='high'?'<span class="chip chip-red" style="font-size:9px">중요</span>':''}</div>`;});
  html+='</div>';
  document.getElementById('selDayItems').innerHTML=html;
}

// GCAL
function openSettings(){if(gcalClientId)document.getElementById('gcalClientId').value=gcalClientId;document.getElementById('settingsModal').classList.add('open');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');}
function connectGcal(){
  const cid=document.getElementById('gcalClientId').value.trim();
  if(!cid){toast('Client ID를 입력해주세요!');return;}
  localStorage.setItem('gcalClientId',cid);gcalClientId=cid;
  const s1=document.createElement('script');s1.src='https://apis.google.com/js/api.js';
  s1.onload=()=>{gapi.load('client',async()=>{await gapi.client.init({});await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest');const s2=document.createElement('script');s2.src='https://accounts.google.com/gsi/client';s2.onload=()=>startGis();document.head.appendChild(s2);});};
  document.head.appendChild(s1);
}
function startGis(){
  const tc=google.accounts.oauth2.initTokenClient({client_id:gcalClientId,scope:'https://www.googleapis.com/auth/calendar.readonly',callback:async(r)=>{if(r.error){toast('❌ 연동 실패: '+r.error);return;}await fetchGcal();gcalConnected=true;localStorage.setItem('gcalConnected','true');updateGcalUI();toast('✅ Google Calendar 연동 완료!');}});
  tc.requestAccessToken({prompt:'consent'});
}
async function fetchGcal(){
  const now=new Date(),after=new Date(now.getFullYear(),now.getMonth(),1).toISOString(),before=new Date(now.getFullYear(),now.getMonth()+3,0).toISOString();
  const r=await gapi.client.calendar.events.list({calendarId:'primary',timeMin:after,timeMax:before,maxResults:100,singleEvents:true,orderBy:'startTime'});
  gcalEvents=r.result.items||[];renderList();renderCalendar();
}
function disconnectGcal(){gcalConnected=false;gcalEvents=[];localStorage.setItem('gcalConnected','false');updateGcalUI();renderList();renderCalendar();toast('연동 해제됐어요.');}
function updateGcalUI(){
  document.getElementById('gcalDot').classList.toggle('connected',gcalConnected);
  document.getElementById('gcalLabel').textContent=gcalConnected?'GCal 연동됨':'Google Calendar';
  document.getElementById('gcalBtn').classList.toggle('active',gcalConnected);
  document.getElementById('gcalInputWrap').style.display=gcalConnected?'none':'block';
  document.getElementById('gcalConnectedWrap').style.display=gcalConnected?'block':'none';
  if(gcalConnected)document.getElementById('gcalEventCount').textContent=gcalEvents.length;
}

// INIT
document.getElementById('yearsLabel').textContent=getYears(state.settings.hireDate);
document.getElementById('e-date').value=todayStr();
document.getElementById('t-date').value=todayStr();
updateGcalUI();renderList();renderCalendar();
</script>
